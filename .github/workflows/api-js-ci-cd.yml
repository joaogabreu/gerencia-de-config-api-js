name: API JS CI/CD
run-name: API JS CI/CD executada por ${{ github.actor }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  API_PATH: APIs para exercícios/api-js
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USER }}/api-js

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: appdb
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U appuser -d appdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: apppassword
      DB_HOST: localhost
      DB_DIALECT: postgres
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: APIs para exercícios/api-js/package-lock.json

      - name: Instalar dependências
        working-directory: ${{ env.API_PATH }}
        run: npm ci

      - name: Build da aplicação
        working-directory: ${{ env.API_PATH }}
        run: npm run build

      - name: Lint
        working-directory: ${{ env.API_PATH }}
        run: npm run lint

      - name: Testes unitários
        working-directory: ${{ env.API_PATH }}
        run: npm run test:unit

      - name: Testes de integração
        working-directory: ${{ env.API_PATH }}
        run: npm run test:integration

      - name: SonarQube
        if: ${{ env.SONAR_TOKEN != '' && vars.SONAR_PROJECT_KEY != '' && vars.SONAR_ORGANIZATION != '' }}
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: ${{ env.API_PATH }}
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ vars.SONAR_ORGANIZATION }}
            -Dsonar.sources=.
            -Dsonar.qualitygate.wait=true

      - name: SAST com Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten

  container:
    name: Container
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Dockerfile Lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: APIs para exercícios/api-js/Dockerfile

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build da imagem
        uses: docker/build-push-action@v6
        with:
          context: ./APIs para exercícios/api-js
          file: ./APIs para exercícios/api-js/Dockerfile
          push: false
          load: true
          tags: api-js:ci

      - name: Scan de vulnerabilidades com Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: api-js:ci
          format: table
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Login no Docker Hub
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_PWD }}

      - name: Build e Push da imagem
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/build-push-action@v6
        with:
          context: ./APIs para exercícios/api-js
          file: ./APIs para exercícios/api-js/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:v${{ github.run_number }}

  deploy-homolog:
    name: Deploy Homologação
    runs-on: ubuntu-latest
    needs: container
    if: ${{ github.event_name != 'pull_request' }}

    steps:
      - name: Deploy no Render (Homolog)
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_HOMOLOG }}

  dast:
    name: DAST
    runs-on: ubuntu-latest
    needs: deploy-homolog
    if: ${{ github.event_name != 'pull_request' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: OWASP ZAP Baseline
        uses: zaproxy/action-baseline@v0.12.0
        continue-on-error: true
        with:
          target: ${{ vars.HOMOLOG_URL }}
          fail_action: true

  deploy-prod:
    name: Deploy Produção
    runs-on: ubuntu-latest
    needs: dast
    if: ${{ github.event_name != 'pull_request' }}
    environment:
      name: production

    steps:
      - name: Deploy no Render (Produção)
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_PROD }}
