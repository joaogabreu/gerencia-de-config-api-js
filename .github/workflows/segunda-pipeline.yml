name: Segunda pipeline
run-name: Segunda pipeline executada por ${{ github.actor }}

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

  release:
  name: Criação de Release
  runs-on: ubuntu-latest
  needs: build
  steps:
    - name: Obtendo o código do projeto
      uses: actions/checkout@v5

    - name: Efetuando o Login no Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USER }}
        password: ${{ secrets.DOCKERHUB_PWD }}

    - name: Build e Push da Imagem Docker
      uses: docker/build-push-action@v6
      with:
        push: true
        context: ./src
        file: segunda-pipeline/dockerfile
        tags: ${{ secrets.DOCKERHUB_USER }}/segunda-pipeline:v${{ github.run_number }}